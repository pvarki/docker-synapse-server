version: 1.0.0

server_name: "${SERVER_DOMAIN}"
public_baseurl: "${SYNAPSE_PUBLIC_BASEURL}"
pid_file: /data/homeserver.pid
macaroon_secret_key: "${SYNAPSE_MACAROON_SECRET_KEY}"

listeners:
  - port: 8448
    tls: true
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

report_stats: no
media_store_path: /data/media_store
max_upload_size: 50M
max_image_pixels: 32M

allow_profile_lookup_over_federation: false
allow_public_rooms_over_federation: false
allow_public_rooms_without_auth: false
room_prejoin_state:
  disable_default_event_types: false
url_preview_enabled: false
enable_room_list_search: true
room_list_publication_rules:
  - user_id: "*"
    action: allow
allow_guest_access: false

registration_shared_secret: "${SYNAPSE_REGISTRATION_SECRET}"

auto_join_rooms:
  - "#${DEPLOYMENT_NAME}-space:${SERVER_DOMAIN}"
  - "#${DEPLOYMENT_NAME}-general:${SERVER_DOMAIN}"
  - "#${DEPLOYMENT_NAME}-helpdesk:${SERVER_DOMAIN}"
  - "#${DEPLOYMENT_NAME}-offtopic:${SERVER_DOMAIN}"
autocreate_auto_join_rooms: false
auto_join_rooms_for_guests: false
auto_join_mxid_localpart: "${SYNAPSE_BOT_USERNAME}"

rc_joins:
  local:
    per_second: 10
    burst_count: 50
  remote:
    per_second: 0.01
    burst_count: 3
  per_room:
    per_second: 50
    burst_count: 100

rc_invites:
  per_user:
    per_second: 10
    burst_count: 50
  per_room:
    per_second: 10
    burst_count: 50

rc_presence:
  per_user:
    per_second: 10
    burst_count: 50

enable_registration: false
enable_registration_without_verification: false

${SYNAPSE_FEDERATION_CONFIG}
# Never use matrix.org as a key server — avoids leaking room/user metadata to a third party.
trusted_key_servers: []
suppress_key_server_warning: true

database:
  name: psycopg2
  args:
    user: ${POSTGRES_USER}
    password: "${POSTGRES_PASSWORD}"
    database: ${POSTGRES_DB}
    host: ${POSTGRES_HOST}
    cp_min: 5
    cp_max: 10

user_directory:
  enabled: true
  search_all_users: true

tls_certificate_path: "/data/certs/${SERVER_DOMAIN}.crt"
tls_private_key_path: "/data/certs/${SERVER_DOMAIN}.key"

password_config:
  enabled: false

oidc_providers:
  # https://element-hq.github.io/synapse/latest/openid.html#keycloak
  - idp_id: keycloak
    idp_name: "Keycloak"
    issuer: "https://${KCDOMAIN}:9443/realms/${KCREALM}"
    client_id: "${CLIENT_ID}"
    client_secret: "${CLIENT_SECRET}"
    scopes: ["openid", "profile"]
    user_mapping_provider:
      config:
        localpart_template: "{{ user.preferred_username }}"
        display_name_template: "{{ user.name }}"
